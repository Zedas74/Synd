<!DOCTYPE html>
<html>

<head>
	<title>html + synd demo</title>
	<link rel="shortcut icon" href="#" />
	<meta http-equiv="Content-type" content="text/html; charset=utf-8" />
	<link rel="stylesheet" href="./synd_demo.css" />
	<script type="module">
import { html, synd } from '../deploy/synd.mjs';
const asCode = (...parts) => highlightMixedCode(parts.join('\n'));

const escapeHTML = text => text
	.replace(/&/g, '&amp;')
	.replace(/</g, '&lt;')
	.replace(/>/g, '&gt;')
	.replace(/"/g, '&quot;')

function highlightMarkup(source) {
	return source.replace(/&lt;(\/)?([A-Za-z][\w:-]*)([\s\S]*?)&gt;/g, (match, slash, tagName, rawAttrs) => {
		let trailingSlash = ''
		let attrs = rawAttrs

		attrs = attrs.replace(/(\s*)\/$/, (_, whitespace) => {
			trailingSlash = `${whitespace}<span class="tok-punct">/</span>`
			return ''
		})

		const highlightedAttrs = attrs.replace(/(\s+)([^\s=\/]+)(?:=(&quot;.*?&quot;|'.*?'|[^\s]+))?/g, (_, whitespace, attrName, attrValue) => {
			const renderedValue = attrValue
				? `<span class="tok-punct">=</span><span class="tok-string">${attrValue}</span>`
				: ''
			return `${whitespace}<span class="tok-attr">${attrName}</span>${renderedValue}`
		})

		return `<span class="tok-punct">&lt;${slash ?? ''}</span><span class="tok-tag">${tagName}</span>${highlightedAttrs}${trailingSlash}<span class="tok-punct">&gt;</span>`
	})
}

function highlightMixedCode(source) {
	return highlightJsFragment(source)
}

function highlightJsFragment(source) {
	let result = ''
	let plainStart = 0
	let index = 0

	const flushPlain = end => {
		if (end > plainStart)
			result += highlightJsPlain(source.slice(plainStart, end))
	}

	while (index < source.length) {
		if (source.startsWith('//', index)) {
			flushPlain(index)
			const end = findLineCommentEnd(source, index)
			result += `<span class="tok-comment">${escapeHTML(source.slice(index, end))}</span>`
			index = end
			plainStart = end
			continue
		}

		if (source.startsWith('/*', index)) {
			flushPlain(index)
			const end = findBlockCommentEnd(source, index)
			result += `<span class="tok-comment">${escapeHTML(source.slice(index, end))}</span>`
			index = end
			plainStart = end
			continue
		}

		if (source[index] === '\'' || source[index] === '"') {
			flushPlain(index)
			const end = findStringEnd(source, index, source[index])
			result += `<span class="tok-string">${escapeHTML(source.slice(index, end))}</span>`
			index = end
			plainStart = end
			continue
		}

		if (source[index] === '`') {
			flushPlain(index)
			const template = highlightTemplateLiteral(source, index)
			result += template.html
			index = template.nextIndex
			plainStart = template.nextIndex
			continue
		}

		index += 1
	}

	flushPlain(source.length)
	return result
}

function highlightJsPlain(source) {
	const tokenPattern = /\b(const|let|var|function|return|if|else|for|of|in|new|true|false|null|undefined)\b|\b(html|synd|document)\b|\b\d+(?:\.\d+)?\b|=>|===|!==|==|!=|<=|>=|\+\+|--|\|\||&&|\.\.\.|[=+\-*\/%<>!?:;.,()[\]{}]/g
	let result = ''
	let lastIndex = 0

	for (const match of source.matchAll(tokenPattern)) {
		result += escapeHTML(source.slice(lastIndex, match.index))

		if (match[1])
			result += `<span class="tok-keyword">${match[1]}</span>`
		else if (match[2])
			result += `<span class="tok-builtin">${match[2]}</span>`
		else if (/^\d/.test(match[0]))
			result += `<span class="tok-number">${match[0]}</span>`
		else
			result += `<span class="tok-punct">${escapeHTML(match[0])}</span>`

		lastIndex = match.index + match[0].length
	}

	result += escapeHTML(source.slice(lastIndex))
	return result
}

function highlightTemplateLiteral(source, startIndex) {
	let result = '<span class="tok-template-delim">`</span>'
	let index = startIndex + 1
	let chunkStart = index

	while (index < source.length) {
		if (source[index] === '\\') {
			index += 2
			continue
		}

		if (source[index] === '`') {
			result += highlightTemplateChunk(source.slice(chunkStart, index))
			result += '<span class="tok-template-delim">`</span>'
			return { html: result, nextIndex: index + 1 }
		}

		if (source[index] === '$' && source[index + 1] === '{') {
			result += highlightTemplateChunk(source.slice(chunkStart, index))
			const end = findInterpolationEnd(source, index + 2)
			result += `<span class="tok-template-expr">\${</span>${highlightJsFragment(source.slice(index + 2, end))}<span class="tok-template-expr">}</span>`
			index = end + 1
			chunkStart = index
			continue
		}

		index += 1
	}

	result += highlightTemplateChunk(source.slice(chunkStart))
	return { html: result, nextIndex: source.length }
}

function highlightTemplateChunk(source) {
	if (!source)
		return ''
		
	return `<span class="tok-template">${highlightMarkup(escapeHTML(source))}</span>`
}

function findLineCommentEnd(source, startIndex) {
	let index = startIndex
	while (index < source.length && source[index] !== '\n')
		index += 1
	return index
}

function findBlockCommentEnd(source, startIndex) {
	const end = source.indexOf('*/', startIndex + 2)
	return end === -1 ? source.length : end + 2
}

function findStringEnd(source, startIndex, quote) {
	let index = startIndex + 1
	while (index < source.length) {
		if (source[index] === '\\') {
			index += 2
			continue
		}
		if (source[index] === quote)
			return index + 1
		index += 1
	}
	return source.length
}

function findInterpolationEnd(source, startIndex) {
	let depth = 1
	let index = startIndex

	while (index < source.length) {
		if (source.startsWith('//', index)) {
			index = findLineCommentEnd(source, index)
			continue
		}

		if (source.startsWith('/*', index)) {
			index = findBlockCommentEnd(source, index)
			continue
		}

		if (source[index] === '\'' || source[index] === '"') {
			index = findStringEnd(source, index, source[index])
			continue
		}

		if (source[index] === '`') {
			index = skipTemplateLiteral(source, index)
			continue
		}

		if (source[index] === '{')
			depth += 1
		else if (source[index] === '}') {
			depth -= 1
			if (depth === 0)
				return index
		}

		index += 1
	}

	return source.length
}

function skipTemplateLiteral(source, startIndex) {
	let index = startIndex + 1

	while (index < source.length) {
		if (source[index] === '\\') {
			index += 2
			continue
		}

		if (source[index] === '`')
			return index + 1

		if (source[index] === '$' && source[index + 1] === '{') {
			index = findInterpolationEnd(source, index + 2) + 1
			continue
		}

		index += 1
	}

	return source.length
}

function highlightCode(source, language = 'js') {
	return source;
}

function highlightJSON(source) {
	return escapeHTML(source)
		.replace(/^(\s*)"([^"]+)":/gm, '$1<span class="tok-json-key">"$2"</span><span class="tok-punct">:</span>')
		.replace(/: ("(?:\\.|[^"])*")/g, ': <span class="tok-json-string">$1</span>')
		.replace(/\b(-?\d+(?:\.\d+)?)\b/g, '<span class="tok-json-number">$1</span>')
		.replace(/\b(true|false|null)\b/g, '<span class="tok-json-literal">$1</span>')
		.replace(/([{}\[\],])/g, '<span class="tok-punct">$1</span>')
}

function createEl(tag, className, text) {
	const element = document.createElement(tag)
	if (className)
		element.className = className
	if (text !== undefined)
		element.textContent = text
	return element
}

function createSectionHead(title, text) {
	const head = createEl('div', 'section-head')
	head.append(createEl('h2', '', title), createEl('p', '', text))
	return head
}

function createPanel(title) {
	const panel = createEl('div', 'demo-panel')
	panel.append(createEl('div', 'panel-title', title))
	const body = createEl('div', 'panel-body')
	panel.append(body)
	return { panel, body }
}

function createCodeBlock({ source, language = 'js', label }) {
	const shell = createEl('div', 'code-sample')
	const caption = createEl('div', 'code-caption')
	caption.append(createEl('strong', '', label || (language === 'html' ? 'HTML minta' : 'JS minta')), createEl('span', 'code-lang', language))

	const pre = createEl('pre', 'code-block')
	const code = createEl('code')
	code.className = 'language-' + language
	code.innerHTML = highlightCode(source, language)
	pre.append(code)
	return shell.append(caption, pre), shell
}

function createSyndIntroBlock() {
	return html`
		<article class="synd-intro">
			<h3>Miért kell a synd a html mellé?</h3>
			<p>A <strong>html</strong> önmagában DOM-ot épít template stringből. Ha később változik az adat, neked kell eldöntened, melyik részt rajzolod újra. A <strong>synd</strong> erre tesz egy könnyű adatfigyelő réteget: a <strong>data</strong> bizonyos ágaihoz DOM-részeket köt, és refresh után csak ezeket a részeket számolja újra.</p>
			<ul>
				<li>A <strong>with(path, tpl)</strong> egy objektum- vagy részobjektum-ágat figyel, és csak a hozzá tartozó DOM-részt frissíti.</li>
				<li>A <strong>for(path, tpl)</strong> listaelemenként hoz létre figyelt DOM-részeket, ezért insert és delete után is stabil marad a szerkezet.</li>
				<li>A lenyíló adatblokk minden példánál a futó <strong>data</strong> aktuális állapotát mutatja, így azonnal látszik, mire reagál a nézet.</li>
			</ul>
		</article>
	`
}

function createJSONViewer(data, title = 'Élő JSON adat ↓') {
	const details = createEl('details', 'json-viewer')
	const summary = createEl('summary', '', title)
	const body = createEl('div', 'json-viewer-body')
	body.append(createEl('p', '', 'Ez a blokk a futó példa aktuális data objektumát mutatja. Minden refresh után frissül.'))
	const pre = createEl('pre', 'json-block')
	body.append(pre)
	details.append(summary, body)

	const render = () => {
		const source = JSON.stringify(data, null, 2)
		const sourceLines = source.split('\n')
		const nextLines = [
			`const data = ${sourceLines[0]}`,
			...sourceLines.slice(1, -1),
			`${sourceLines[sourceLines.length - 1]};`
		]
		pre.innerHTML = nextLines.map((line, index) => {
			return `<span class="json-line">${highlightLiveDataLine(line, index, nextLines.length)}</span>`
		}).join('')
	}

	render()
	return { details, render }
}

function createCounterVariantCard(title, note) {
	const card = createEl('article', 'counter-variant')
	card.append(createEl('div', 'counter-variant-head', title), createEl('p', 'counter-variant-note', note))
	const body = createEl('div', 'counter-variant-body')
	card.append(body)
	return { card, body }
}

function highlightLiveDataLine(line, index, totalLines) {
	if (index === 0 || index === totalLines - 1)
		return highlightMixedCode(line)
	return highlightJSON(line)
}

function mountDemoCard(container, example) {
	const card = createEl('article', 'demo-card')
	card.append(createEl('h3', '', example.title), createEl('p', '', example.description))

	if (example.inlinePairs) {
		const pairedRoot = createEl('div', 'counter-pair-stack')
		for (const pair of example.inlinePairs) {
			const row = createEl('div', 'counter-pair')
			row.append(createCodeBlock(pair.codeBlock))

			const livePanel = createEl('div', 'counter-variant')
			livePanel.append(createEl('div', 'counter-variant-head', pair.label), createEl('p', 'counter-variant-note', pair.note))
			const liveBody = createEl('div', 'counter-variant-body')
			livePanel.append(liveBody)

			pair.render(liveBody)
			row.append(livePanel)
			pairedRoot.append(row)
		}
		card.append(pairedRoot)
		container.append(card)
		return
	}

	const grid = createEl('div', 'demo-grid')
	const codePanel = createPanel('Kódminta')
	const livePanel = createPanel('Élő eredmény')
	const liveRoot = createEl('div', 'demo-live')
	const codeStack = createEl('div', 'code-stack')
	const codeBlocks = example.codeBlocks ?? [{ source: example.code, language: example.language ?? 'js' }]

	codeBlocks.forEach(block => codeStack.append(createCodeBlock(block)))
	codePanel.body.append(codeStack)
	livePanel.body.append(liveRoot)
	grid.append(codePanel.panel, livePanel.panel)
	card.append(grid)
	container.append(card)

	const result = example.render ? example.render(liveRoot) : undefined

	if (result?.data) {
		const inspector = createJSONViewer(result.data, example.jsonTitle)
		if (example.liveDataBeforeCode)
			codePanel.body.prepend(inspector.details)
		else
			codePanel.body.append(inspector.details)
		if (result.control?.refresh) {
			const originalRefresh = result.control.refresh.bind(result.control)
			result.control.refresh = (...args) => {
				const refreshResult = originalRefresh(...args)
				inspector.render()
				return refreshResult
			}
		}
	}
}

function renderExamples(container, examples) {
	examples.forEach(example => mountDemoCard(container, example))
}
