<!DOCTYPE html>
<html>

<head>
	<title>Synd nesting</title>
	<link rel="shortcut icon" href="#" />
	<meta http-equiv="Content-type" content="text/html; charset=utf-8" />
	<style>

table { border-collapse: collapse; border: 1px solid silver; margin: 0.5rem }
td { border: 1px solid silver }

	</style>
	<script type="module">
import { html, synd } from './synd.mjs';
document.addEventListener('DOMContentLoaded', () => {
	const data = {
		items: [
			{ title: 'one', value: 1 },
			{ title: 'two', value: 2 },
			{ title: 'three', value: 3 }
		],
		counters: {
			first: 1,
			second: {
				value: 2
			}
		}
	}

	const oPage = synd({ data, container: document.body }, (oData, oRoot) => html`
		<p>This example shows how to use synd with nested, duplicated sources.</p>
		<p>Check the source to see how it works.</p>
		<hr/>
		<p>
			<button onClick="${e => { data.counters.first++; oPage.refresh(); }}">Increase val 1</button>
			<button onClick="${e => { data.counters.second.value++; oPage.refresh(); }}">Increase val 2</button><br/><br/>
			<button onClick="${e => { 
				const iPos = Math.random() *data.items.length |0;
				data.items.splice(iPos, 0, { title: 'new → ' +iPos, value: data.counters.first }); 
				oPage.refresh(); 
			}}">Append row to random position</button>
			<button onClick="${e => { data.items.splice(0, 1); oPage.refresh(); }}">Delete first row</button><br/><br/>
			<button onClick="${e => document.querySelectorAll('tr').forEach(o => o.style.color = 'green')}">Colorize DOM to show what changed</button>
		</p>
		<hr/>
	 	<p>${
			oRoot.with('.counters', $ => html`val 1: <b>${$.first}</b>`)
		}<br/>val 2: <i>${
			oRoot.with('.counters.second', $ => $.value)
		}</i><br/>${
			oRoot.with('.counters', ($, oCnt) => html`<span style="color:red"><b>${$.first}</b> - ${
				oCnt.with('.second', $ => html`<i>${$.value}</i>`)
			}</span>`)
		}</p>
		<table>
			<!-- table -->
			${oRoot.for('.items', oItem => 
				html`<tr><td>${oItem.title}</td><td>${oItem.value}</td><td>, 
					static val 1: <u>${oData.counters.second.value}</u>, 
					live val 2: <u>${oRoot.with('.counters.second', $ => $.value)}</u>
				</td></tr>`
			)}
		</table>
	`);

});

	</script>
</head>

<body>
</body>

</html>
